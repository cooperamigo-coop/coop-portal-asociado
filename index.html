<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- VIEWPORT -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Cooperamigó" />

    <!-- FAVICON -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />

    <!-- SEO BÁSICO -->
    <title>Servicios Digitales - Cooperamigó</title>
    <meta name="description" content="Portal digital de Cooperamigó para solicitudes de afiliación y crédito. Su bienestar es nuestra razón de ser." />
    <meta name="author" content="Cooperamigó" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- OPEN GRAPH (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cooperamigó" />
    <meta property="og:title" content="Cooperamigó — Portal de afiliaciones y créditos" />
    <meta property="og:description" content="Gestión digital de afiliaciones y créditos. Su bienestar es nuestra razón de ser." />
    <meta property="og:image" content="/logo-principal.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Cooperamigó" />
    <meta property="og:locale" content="es_CO" />

    <!-- TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cooperamigó" />
    <meta name="twitter:description" content="Portal de afiliaciones y créditos. Su bienestar es nuestra razón de ser." />
    <meta name="twitter:image" content="/logo-principal.svg" />

    <!-- TEMA DE COLOR (barra del navegador en mobile) -->
    <meta name="theme-color" content="#172B36" />
    <meta name="msapplication-TileColor" content="#172B36" />

    <!-- PRELOAD imagen de fondo desktop -->
    <link rel="preload" as="image" href="/imagen1.png" media="(min-width: 961px)" />

    <!-- FUENTES: servidas localmente desde src/assets/fonts (DM Sans) -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
